<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>历史版本 - AMap Companion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f5f7;
      --white: #fff;
      --text-primary: #1d1d1f;
      --text-secondary: #6e6e73;
      --text-tertiary: #86868b;
      --divider: rgba(0,0,0,0.06);
      --red: #ff3b30;
      --orange: #ff9500;
      --green: #34c759;
      --blue: #007aff;
      --blue-dark: #0056cc;
      --font: 'DM Sans', 'Noto Sans SC', -apple-system, 'SF Pro Display', 'PingFang SC', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      min-height: 100vh;
      font-family: var(--font);
      background:
        radial-gradient(circle at 12% 8%, rgba(255,59,48,0.08), transparent 28%),
        radial-gradient(circle at 82% 18%, rgba(52,199,89,0.08), transparent 26%),
        radial-gradient(circle at 50% 92%, rgba(0,122,255,0.09), transparent 30%),
        var(--bg);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
    }
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      background: rgba(245,245,247,0.68);
      backdrop-filter: saturate(200%) blur(24px);
      -webkit-backdrop-filter: saturate(200%) blur(24px);
      border-bottom: 0.5px solid var(--divider);
    }
    .nav-brand {
      color: var(--text-primary);
      font-size: 0.88rem;
      font-weight: 600;
      text-decoration: none;
    }
    .nav-links { display: flex; gap: 28px; list-style: none; }
    .nav-links a {
      color: var(--text-tertiary);
      font-size: 0.76rem;
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--text-primary); }

    main {
      width: min(980px, calc(100% - 48px));
      margin: 0 auto;
      padding: 78px 0 72px;
    }

    .page-head {
      display: grid;
      gap: 16px;
      max-width: 720px;
      margin-bottom: 32px;
      animation: fade-up 0.8s cubic-bezier(0.22,1,0.36,1) both;
    }
    .overline {
      color: var(--blue);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    h1 {
      color: var(--text-primary);
      font-size: clamp(2.4rem, 7vw, 4.8rem);
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1.02;
    }
    .head-copy {
      color: var(--text-secondary);
      font-size: clamp(0.98rem, 2vw, 1.16rem);
      line-height: 1.65;
      max-width: 620px;
    }
    .head-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 4px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 18px;
      border-radius: 100px;
      color: var(--blue);
      background: rgba(255,255,255,0.68);
      box-shadow: 0 1px 2px rgba(0,0,0,0.03), 0 0 0 0.5px rgba(0,0,0,0.05);
      font-size: 0.82rem;
      font-weight: 600;
      text-decoration: none;
      transition: transform 0.2s, background 0.2s;
    }
    .btn:hover { transform: translateY(-1px); background: rgba(255,255,255,0.9); }
    .btn.primary {
      color: #fff;
      background: var(--blue);
      box-shadow: 0 6px 18px rgba(0,122,255,0.18), 0 0 0 0.5px rgba(0,122,255,0.3);
    }
    .btn.primary:hover { background: var(--blue-dark); }

    .summary {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin: 28px 0 18px;
      animation: fade-up 0.8s cubic-bezier(0.22,1,0.36,1) 0.08s both;
    }
    .summary-item {
      padding: 16px 18px;
      border-radius: 16px;
      background: rgba(255,255,255,0.78);
      box-shadow: 0 0.5px 1px rgba(0,0,0,0.04), 0 0 0 0.5px rgba(0,0,0,0.04);
    }
    .summary-item strong {
      display: block;
      margin-bottom: 4px;
      font-size: 1.25rem;
      letter-spacing: -0.02em;
    }
    .summary-item span {
      color: var(--text-tertiary);
      font-size: 0.72rem;
    }

    .version-list {
      display: grid;
      gap: 14px;
      margin-top: 18px;
    }
    .version-card {
      position: relative;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 170px;
      gap: 24px;
      padding: 24px;
      border-radius: 20px;
      background: rgba(255,255,255,0.86);
      box-shadow:
        0 1px 2px rgba(0,0,0,0.04),
        0 12px 36px rgba(0,0,0,0.035),
        0 0 0 0.5px rgba(0,0,0,0.04);
      overflow: hidden;
      animation: fade-up 0.8s cubic-bezier(0.22,1,0.36,1) both;
    }
    .version-card::before {
      content: '';
      position: absolute;
      inset: 0 auto 0 0;
      width: 4px;
      background: linear-gradient(var(--red), var(--orange), var(--green), var(--blue));
      opacity: 0.72;
    }
    .version-main { min-width: 0; }
    .version-title {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .version-title h2 {
      min-width: 0;
      color: var(--text-primary);
      font-size: 1.16rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      overflow-wrap: anywhere;
    }
    .pill {
      padding: 4px 9px;
      border-radius: 100px;
      color: #18794e;
      background: rgba(52,199,89,0.12);
      font-size: 0.66rem;
      font-weight: 700;
    }
    .version-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 12px;
      margin-bottom: 16px;
      color: var(--text-tertiary);
      font-size: 0.74rem;
      line-height: 1.5;
    }
    .changelog {
      padding: 14px 16px;
      border-radius: 14px;
      background: rgba(245,245,247,0.7);
      border: 0.5px solid rgba(0,0,0,0.04);
    }
    .changelog h3 {
      margin-bottom: 8px;
      color: var(--text-primary);
      font-size: 0.78rem;
      font-weight: 700;
    }
    .changelog ul {
      display: grid;
      gap: 6px;
      list-style: none;
    }
    .changelog li {
      position: relative;
      padding-left: 14px;
      color: var(--text-secondary);
      font-size: 0.82rem;
      line-height: 1.65;
    }
    .changelog li::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0.72em;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--blue);
      opacity: 0.65;
    }
    .version-side {
      display: grid;
      align-content: start;
      gap: 10px;
    }
    .download {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 18px;
      border-radius: 100px;
      color: #fff;
      background: var(--text-primary);
      font-size: 0.82rem;
      font-weight: 700;
      text-decoration: none;
      transition: transform 0.2s, background 0.2s;
    }
    .download:hover { transform: translateY(-1px); background: var(--blue); }
    .hash {
      color: var(--text-tertiary);
      font-size: 0.68rem;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }
    .release-link {
      color: var(--blue);
      font-size: 0.74rem;
      font-weight: 600;
      text-decoration: none;
    }
    .release-link:hover { text-decoration: underline; }
    .empty {
      padding: 42px 24px;
      border-radius: 20px;
      text-align: center;
      color: var(--text-secondary);
      background: rgba(255,255,255,0.78);
      box-shadow: 0 0.5px 1px rgba(0,0,0,0.04), 0 0 0 0.5px rgba(0,0,0,0.04);
    }

    footer {
      width: min(980px, calc(100% - 48px));
      margin: 0 auto;
      padding: 24px 0 42px;
      border-top: 0.5px solid var(--divider);
      color: var(--text-tertiary);
      font-size: 0.72rem;
      text-align: center;
    }
    footer a { color: var(--text-secondary); text-decoration: none; }
    footer a:hover { color: var(--blue); }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(22px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 760px) {
      nav { height: 48px; padding: 0 20px; }
      .nav-links { gap: 18px; }
      .nav-links a { font-size: 0.72rem; }
      main { width: calc(100% - 32px); padding: 54px 0 48px; }
      .summary { grid-template-columns: 1fr; }
      .version-card { grid-template-columns: 1fr; gap: 18px; padding: 20px; border-radius: 18px; }
      .version-side { gap: 12px; }
      .download { width: 100%; }
    }
  </style>
</head>
<body>
<nav>
  <a class="nav-brand" href="/">AMap Companion</a>
  <ul class="nav-links">
    <li><a href="/">首页</a></li>
    <li><a href="/#changelog">最新日志</a></li>
    <li><a href="https://github.com/zuo-qirun/amap-companion/releases" target="_blank">GitHub Release</a></li>
  </ul>
</nav>

<main>
  <header class="page-head">
    <p class="overline">Release Archive</p>
    <h1>历史版本</h1>
    <p class="head-copy">这里列出服务器已经从 GitHub Release 预先缓存的 APK。每个版本都可直接从本站下载，并附带对应的更新日志、大小和校验信息。</p>
    <div class="head-actions">
      <a class="btn primary" href="/" id="latest-link">下载最新版本</a>
      <a class="btn" href="/versions-github.json" target="_blank">GitHub 直连清单</a>
    </div>
  </header>

  <section class="summary" aria-label="历史版本概览">
    <div class="summary-item"><strong id="count">0</strong><span>已缓存版本</span></div>
    <div class="summary-item"><strong id="latest">-</strong><span>最新版本</span></div>
    <div class="summary-item"><strong id="updated">-</strong><span>清单更新时间</span></div>
  </section>

  <section class="version-list" id="versions">
    <div class="empty">正在加载历史版本...</div>
  </section>
</main>

<footer>
  AMap Companion · <a href="/">返回首页</a>
</footer>

<script>
function formatSize(bytes) {
  if (!bytes) return "";
  if (bytes < 1024) return bytes + " B";
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + " KB";
  return (bytes / 1048576).toFixed(1) + " MB";
}
function formatDate(value) {
  if (!value) return "";
  var date = new Date(value);
  if (isNaN(date.getTime())) return "";
  return date.toLocaleDateString("zh-CN", {year: "numeric", month: "2-digit", day: "2-digit"});
}
function text(value, fallback) {
  var result = String(value || "").trim();
  return result || fallback || "";
}
function normalizeChangelog(value) {
  if (Array.isArray(value)) return value.map(function(item) { return text(item); }).filter(Boolean);
  var single = text(value);
  return single ? [single] : [];
}
function appendText(parent, tag, className, value) {
  var node = document.createElement(tag);
  if (className) node.className = className;
  node.textContent = value;
  parent.appendChild(node);
  return node;
}
function renderVersion(item, index) {
  var card = document.createElement("article");
  card.className = "version-card";
  card.style.animationDelay = Math.min(index * 0.04, 0.4) + "s";

  var main = document.createElement("div");
  main.className = "version-main";
  var title = document.createElement("div");
  title.className = "version-title";
  appendText(title, "h2", "", text(item.versionName || item.releaseTag, "未命名版本"));
  if (index === 0) appendText(title, "span", "pill", "最新");
  main.appendChild(title);

  var meta = document.createElement("div");
  meta.className = "version-meta";
  var metaParts = [];
  if (item.versionCode) metaParts.push("Code " + item.versionCode);
  if (item.releaseTag) metaParts.push(item.releaseTag);
  if (item.size) metaParts.push(formatSize(item.size));
  if (item.publishedAt || item.builtAt) metaParts.push(formatDate(item.publishedAt || item.builtAt));
  if (item.downloadChannel === "server") metaParts.push("本站缓存");
  metaParts.forEach(function(part) { appendText(meta, "span", "", part); });
  main.appendChild(meta);

  var changelog = document.createElement("section");
  changelog.className = "changelog";
  appendText(changelog, "h3", "", "更新日志");
  var lines = normalizeChangelog(item.changelog);
  var list = document.createElement("ul");
  if (!lines.length) lines = ["此版本未提供更新日志。"];
  lines.forEach(function(line) { appendText(list, "li", "", line); });
  changelog.appendChild(list);
  main.appendChild(changelog);

  var side = document.createElement("aside");
  side.className = "version-side";
  if (item.apkUrl) {
    var download = document.createElement("a");
    download.className = "download";
    download.href = item.apkUrl;
    download.download = "";
    download.textContent = "下载 APK";
    side.appendChild(download);
  }
  if (item.releaseUrl) {
    var release = document.createElement("a");
    release.className = "release-link";
    release.href = item.releaseUrl;
    release.target = "_blank";
    release.rel = "noreferrer";
    release.textContent = "查看 Release";
    side.appendChild(release);
  }
  if (item.sha256) appendText(side, "div", "hash", "SHA-256: " + item.sha256);

  card.append(main, side);
  return card;
}
function renderVersions(data) {
  var versions = Array.isArray(data.versions) ? data.versions : [];
  var list = document.getElementById("versions");
  document.getElementById("count").textContent = versions.length;
  document.getElementById("latest").textContent = versions[0] ? text(versions[0].versionName || versions[0].releaseTag, "-") : "-";
  document.getElementById("updated").textContent = formatDate(data.generatedAt) || "-";
  list.replaceChildren();
  if (!versions.length) {
    var empty = document.createElement("div");
    empty.className = "empty";
    empty.textContent = "暂无历史版本。请先在服务器运行 npm run sync:force，或等待自动同步完成。";
    list.appendChild(empty);
    return;
  }
  versions.forEach(function(item, index) {
    list.appendChild(renderVersion(item, index));
  });
}
async function init() {
  try {
    var latest = await fetch("/update.json");
    if (latest.ok) {
      var info = await latest.json();
      if (info.apkUrl) document.getElementById("latest-link").href = info.apkUrl;
    }
  } catch (error) {}
  try {
    var resp = await fetch("/versions.json");
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    renderVersions(await resp.json());
  } catch (error) {
    var list = document.getElementById("versions");
    list.replaceChildren();
    var empty = document.createElement("div");
    empty.className = "empty";
    empty.textContent = "历史版本加载失败，请稍后再试。";
    list.appendChild(empty);
  }
}
init();
</script>
</body>
</html>
